version: '3.8'

services:
  # Go API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herb-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=herb_recognition
      - SERVER_PORT=8080
      - PYTHON_SERVICE_URL=http://inference:5001
      - AUTO_CREATE_ROOT=${AUTO_CREATE_ROOT:-true}
    depends_on:
      db:
        condition: service_healthy
      inference:
        condition: service_healthy
    networks:
      - herb-network
    restart: unless-stopped

  # Python Inference Service
  inference:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: herb-inference
    ports:
      - "5001:5001"
    depends_on:
      - model-storage
    volumes:
      - model-storage:/app/models
    networks:
      - herb-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:5001/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: herb-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=herb_recognition
      - TZ=Asia/Shanghai
    volumes:
      - db-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - herb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Model storage volume (to share models between services)
  model-storage:
    image: busybox
    container_name: herb-model-storage
    volumes:
      - model-storage:/app/models
    command: tail -f /dev/null
    networks:
      - herb-network

volumes:
  db-data:
  model-storage:

networks:
  herb-network:
    driver: bridge
