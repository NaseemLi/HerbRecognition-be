services:
  # Go API Service (包含 ONNX 推理)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: herb-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=herb_recognition
      - SERVER_PORT=8080
      - AUTO_CREATE_ROOT=${AUTO_CREATE_ROOT:-true}
      - LD_LIBRARY_PATH=/usr/local/lib:/usr/lib
      - ONNX_RUNTIME_LIB=/usr/local/lib/libonnxruntime.so
    depends_on:
      db:
        condition: service_healthy
    networks:
      - herb-network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: herb-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=herb_recognition
      - TZ=Asia/Shanghai
    volumes:
      - db-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - herb-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db-data:

networks:
  herb-network:
    name: herb-network
    external: true
